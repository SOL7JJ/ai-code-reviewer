<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Code Reviewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel">
        <p class="eyebrow">Mock Review Tool</p>
        <h1>AI Code Reviewer</h1>
        <p class="intro">
          Paste code below and submit it to the mocked analysis endpoint.
        </p>

        <form id="review-form" class="review-form">
          <label for="code-input">Code</label>
          <textarea
            id="code-input"
            name="code"
            placeholder="Paste JavaScript, TypeScript, Python, or any other code here..."
            required
          ></textarea>
          <button type="submit">Analyze Code</button>
        </form>
      </section>

      <section class="panel result-panel">
        <h2>Feedback</h2>
        <div id="status-message" class="status">Waiting for input.</div>
        <pre id="result-output" class="result-output">No analysis yet.</pre>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
